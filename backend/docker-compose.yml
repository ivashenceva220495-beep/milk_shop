version: '3.8'

services:
  backend:
    build: .
    container_name: shop_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:123@db:5432/shop
    depends_on:
      - db
    volumes:
      - ./app:/app/app

  db:
    image: postgres:16
    container_name: shop_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
